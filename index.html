<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tripla · Inteligência de Mercado · Matriz GTM</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-dark:#152454;--blue-main:#0057D5;--blue-light:#00A0FF;--cyan:#38DBFF;
  --bg:#f2f5fc;--surface:#fff;--surface2:#edf1f9;--surface3:#e0e8f5;
  --border:#d0d9ee;--border2:#b8c6e0;
  --text:#0f1a3a;--muted:#5a6a90;--muted2:#8090b8;
  --z1t:#3a3a98;--z1b:rgba(90,90,184,.07);--z1bd:rgba(90,90,184,.28);
  --z2t:#904820;--z2b:rgba(184,104,48,.07);--z2bd:rgba(184,104,48,.28);
  --z3t:#003aaa;--z3b:rgba(0,87,213,.07);--z3bd:rgba(0,87,213,.25);
  --z4t:#4a5a7a;--z4b:rgba(112,128,160,.07);--z4bd:rgba(112,128,160,.22);
  --cyber:#0057D5;--gov:#0a8a5c;--infra:#c03030;--smart:#7040c0;
  --warn:#f59e0b;--danger:#c03030;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:0 4px 12px rgba(0,0,0,.12),0 16px 48px rgba(0,0,0,.1);
  --r:8px;--rl:12px;--rxl:16px;--panel-w:420px;--hdr-h:56px;
}
[data-theme=dark]{
  --bg:#08101f;--surface:#0d1626;--surface2:#131e30;--surface3:#192438;
  --border:#1e2d48;--border2:#2a3d60;
  --text:#dde5f8;--muted:#6878a8;--muted2:#8090b8;
  --z1t:#9090d8;--z2t:#d88848;--z3t:#4898f8;--z4t:#8090b8;
  --cyber:#60a5fa;--gov:#34d399;--infra:#f87171;--smart:#c084fc;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
  --shadow-lg:0 4px 12px rgba(0,0,0,.45),0 16px 48px rgba(0,0,0,.38);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* LOADING */
#loadingScreen{position:fixed;inset:0;z-index:3000;background:linear-gradient(135deg,#06090f,#152454,#0057D5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.ld-spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.18);border-top-color:var(--cyan);border-radius:50%;animation:spin .85s linear infinite}
.ld-msg{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.04em}
@keyframes spin{to{transform:rotate(360deg)}}
.v-hidden{display:none!important}

/* AUTH */
#authWrap{position:fixed;inset:0;z-index:2000;background:linear-gradient(135deg,#06090f,#152454,#0057D5);display:none;align-items:center;justify-content:center}
#authWrap.show{display:flex}
.auth-box{background:rgba(13,22,38,.95);border:1px solid rgba(56,219,255,.14);border-radius:var(--rxl);padding:36px 40px;width:380px;backdrop-filter:blur(20px);box-shadow:0 24px 72px rgba(0,0,0,.6)}
.auth-logo{display:block;margin-bottom:22px}
.auth-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
.auth-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:28px}
.auth-lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px}
.auth-inp{width:100%;padding:10px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:var(--r);color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:12px}
.auth-inp:focus{border-color:var(--cyan)}
.auth-btn{width:100%;padding:12px;background:var(--blue-main);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:6px}
.auth-btn:hover{background:#0048b8}
.auth-err{font-size:12px;color:#f87171;min-height:18px;margin-top:8px}

/* HEADER */
#hdr{height:var(--hdr-h);min-height:var(--hdr-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;flex-shrink:0}
.hdr-brand{display:flex;align-items:center;gap:10px;text-decoration:none;user-select:none}
.hdr-div{width:1px;height:26px;background:var(--border)}
.hdr-titles{line-height:1.1}
.hdr-sub{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--muted2)}
.hdr-main{font-size:15px;font-weight:800;color:var(--blue-main)}
.hdr-sp{flex:1}
.hdr-tabs{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:3px}
.top-tab{padding:5px 16px;font-size:12px;font-weight:600;border:none;border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit}
.top-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.hdr-btns{display:flex;gap:6px;align-items:center}
.icon-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0;font-family:inherit}
.icon-btn:hover{border-color:var(--blue-main);color:var(--blue-main)}
.user-chip{display:flex;align-items:center;gap:7px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none}
.user-chip:hover{border-color:var(--blue-main)}
.user-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;flex-shrink:0}

/* LAYOUT */
#appWrap{display:none;flex-direction:column;height:calc(100vh - var(--hdr-h));overflow:hidden}
#appWrap.show{display:flex}
#mainContent{flex:1;display:flex;overflow:hidden;position:relative}

/* MATRIX */
#matrixView{flex:1;overflow:auto;padding:16px 16px 24px}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:100%}
.mzone{border:1.5px solid var(--border);border-radius:var(--rl);padding:14px;display:flex;flex-direction:column;gap:10px;min-height:240px;position:relative;overflow:hidden;transition:border-color .2s}
.mzone::before{content:'';position:absolute;inset:0;pointer-events:none;border-radius:calc(var(--rl) - 1.5px)}
.mzone.z1{border-color:var(--z1bd)}.mzone.z1::before{background:var(--z1b)}
.mzone.z2{border-color:var(--z2bd)}.mzone.z2::before{background:var(--z2b)}
.mzone.z3{border-color:var(--z3bd)}.mzone.z3::before{background:var(--z3b)}
.mzone.z4{border-color:var(--z4bd)}.mzone.z4::before{background:var(--z4b)}
.zone-hdr{display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.zone-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.z1 .zone-badge{background:var(--z1b);color:var(--z1t);border:1px solid var(--z1bd)}
.z2 .zone-badge{background:var(--z2b);color:var(--z2t);border:1px solid var(--z2bd)}
.z3 .zone-badge{background:var(--z3b);color:var(--z3t);border:1px solid var(--z3bd)}
.z4 .zone-badge{background:var(--z4b);color:var(--z4t);border:1px solid var(--z4bd)}
.zone-name{font-size:13px;font-weight:700;color:var(--text)}
.zone-desc{font-size:11px;color:var(--muted);position:relative;z-index:1;line-height:1.4}
.zone-chips{display:flex;flex-wrap:wrap;gap:6px;position:relative;z-index:1}
.zone-add{width:28px;height:28px;border:1.5px dashed var(--border2);border-radius:6px;background:transparent;color:var(--muted2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1}
.zone-add:hover{border-color:var(--blue-main);color:var(--blue-main);background:rgba(0,87,213,.06)}

/* CHIPS */
.chip{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;max-width:185px;user-select:none}
.chip:hover{border-color:var(--blue-main);box-shadow:0 2px 10px rgba(0,87,213,.15)}
.chip.active{border-color:var(--blue-main);background:rgba(0,87,213,.07);box-shadow:0 2px 10px rgba(0,87,213,.2)}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chip[data-bu=cyber] .chip-dot{background:var(--cyber)}
.chip[data-bu=gov] .chip-dot{background:var(--gov)}
.chip[data-bu=infra] .chip-dot{background:var(--infra)}
.chip[data-bu=smart] .chip-dot{background:var(--smart)}
.chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.chip-warn{font-size:10px;color:var(--warn);flex-shrink:0}

/* PANEL */
#panel{width:0;border-left:0px solid var(--border);background:var(--surface);overflow:hidden;transition:width .25s cubic-bezier(.4,0,.2,1),border-width .25s;display:flex;flex-direction:column;flex-shrink:0}
#panel.open{width:var(--panel-w);border-left-width:1px}
.panel-sticky{position:sticky;top:0;background:var(--surface);z-index:10;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-topbar{display:flex;align-items:flex-start;gap:8px;padding:13px 14px 0}
.panel-left{flex:1;min-width:0}
.panel-breadcrumb{font-size:10px;color:var(--muted2);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
.panel-title-wrap{display:flex;align-items:center;gap:6px}
.panel-title{font-size:14px;font-weight:800;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;padding-bottom:0}
.panel-title-edit{font-size:14px;font-weight:800;color:var(--text);border:1px solid var(--blue-main);border-radius:6px;background:var(--surface2);padding:3px 7px;font-family:inherit;outline:none;min-width:0;flex:1}
.panel-actions{display:flex;gap:5px;flex-shrink:0;padding-top:2px}
.panel-edit-btn,.panel-close-btn{height:27px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;padding:0 9px}
.panel-edit-btn:hover{border-color:var(--blue-main);color:var(--blue-main)}
.panel-edit-btn.on{background:var(--blue-main);border-color:var(--blue-main);color:#fff}
.panel-close-btn{width:27px;padding:0;font-size:14px}
.panel-close-btn:hover{background:var(--surface2);color:var(--text)}
.panel-nav{display:flex;padding:8px 14px 0;gap:0;border-top:1px solid var(--border);margin-top:10px}
.pnav-btn{flex:1;padding:7px 2px 8px;font-size:11px;font-weight:600;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit;text-align:center;white-space:nowrap}
.pnav-btn.active{color:var(--blue-main);border-bottom-color:var(--blue-main)}
.pnav-btn:hover:not(.active){color:var(--text)}
.panel-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:0}
.panel-save-bar{padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;display:none}
.panel-save-bar.show{display:flex;gap:8px;justify-content:flex-end}
.psave-btn{padding:7px 18px;background:var(--blue-main);border:none;border-radius:var(--r);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.psave-btn:hover{background:#0048b8}
.pcancel-btn{padding:7px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}

/* PANEL SECTIONS */
.psec{margin-bottom:16px}
.psec-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.psub{margin-bottom:10px}
.psub-title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.pfield{margin-bottom:9px}
.pfield-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.pfield-val{font-size:13px;color:var(--text);line-height:1.5}
.pfield-empty{font-size:12px;color:var(--muted2);font-style:italic}
.pfield input,.pfield textarea,.pfield select{width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;resize:vertical;line-height:1.5}
.pfield input:focus,.pfield textarea:focus,.pfield select:focus{border-color:var(--blue-main)}
.pfield textarea{min-height:58px}
.pfield select option{background:var(--surface)}
.axis-pills{display:flex;gap:6px;flex-wrap:wrap}
.axis-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text)}
.axis-pill.alta{background:rgba(192,32,32,.08);color:#c03030;border-color:rgba(192,32,32,.22)}
.axis-pill.media{background:rgba(184,104,48,.08);color:#904820;border-color:rgba(184,104,48,.22)}
.axis-pill.baixa{background:rgba(10,138,92,.08);color:#0a8a5c;border-color:rgba(10,138,92,.22)}
[data-theme=dark] .axis-pill.alta{color:#f87171;background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.25)}
[data-theme=dark] .axis-pill.media{color:#d88848;background:rgba(216,136,72,.1);border-color:rgba(216,136,72,.25)}
[data-theme=dark] .axis-pill.baixa{color:#34d399;background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.25)}

/* TOOLTIP */
.tip{position:relative;display:inline-flex;align-items:center}
.tip-icon{width:14px;height:14px;border-radius:50%;background:var(--surface3);color:var(--muted2);font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;cursor:help;border:1px solid var(--border);margin-left:4px;flex-shrink:0}
.tip-text{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--blue-dark);color:#fff;font-size:11px;padding:6px 10px;border-radius:6px;width:180px;text-align:center;white-space:normal;line-height:1.4;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300;font-weight:400}
.tip:hover .tip-text{opacity:1}

/* TAGS */
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.ptag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.ptag-x{width:14px;height:14px;border-radius:50%;background:var(--surface3);color:var(--muted2);border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;padding:0;flex-shrink:0;font-family:inherit}
.ptag-x:hover{background:#f87171;color:#fff}
.ptag-add{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;background:transparent;border:1.5px dashed var(--border2);color:var(--muted2);cursor:pointer;transition:all .15s;font-family:inherit}
.ptag-add:hover{border-color:var(--blue-main);color:var(--blue-main);background:rgba(0,87,213,.05)}

/* TAG POPUP */
#tagPopup{position:fixed;z-index:600;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow-lg);padding:14px;width:290px;display:none}
.popup-title{font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.popup-cats{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.popup-cat{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit}
.popup-cat.on{border-color:var(--blue-main);background:rgba(0,87,213,.09);color:var(--blue-main)}
.popup-inp{width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color .2s}
.popup-inp:focus{border-color:var(--blue-main)}
.popup-row{display:flex;gap:6px;justify-content:flex-end}
.popup-save{padding:6px 14px;background:var(--blue-main);border:none;border-radius:var(--r);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.popup-cancel{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}

/* PERSONA */
.persona-card{border:1px solid var(--border);border-radius:var(--rl);padding:12px;background:var(--surface2);margin-bottom:8px}
.persona-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.persona-cargo{font-size:12px;font-weight:700;color:var(--blue-main)}
.persona-del{padding:3px 8px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.persona-del:hover{background:rgba(248,113,113,.1);border-color:#f87171;color:#f87171}
.persona-field{margin-bottom:7px}
.persona-field-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);margin-bottom:3px}
.persona-field-val{font-size:12px;color:var(--text);line-height:1.5}
.persona-add-btn{width:100%;padding:9px;border:1.5px dashed var(--border2);border-radius:var(--rl);background:transparent;color:var(--muted2);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;text-align:center}
.persona-add-btn:hover{border-color:var(--blue-main);color:var(--blue-main);background:rgba(0,87,213,.04)}
.persona-form{border:1px solid var(--blue-main);border-radius:var(--rl);padding:12px;background:rgba(0,87,213,.04);margin-bottom:8px}
.persona-form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:8px}
.btn-sm-save{padding:5px 13px;background:var(--blue-main);border:none;border-radius:var(--r);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm-cancel{padding:5px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit}

/* ADD MODAL */
#addModal{position:fixed;inset:0;z-index:700;background:rgba(8,13,26,.72);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
#addModal.show{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rxl);padding:24px;width:520px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-h{font-size:16px;font-weight:800;color:var(--text);margin-bottom:18px}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{margin-bottom:12px}
.mf label{display:block;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);margin-bottom:5px}
.mf input,.mf select,.mf textarea{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;resize:vertical}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--blue-main)}
.mf select option{background:var(--surface)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);align-items:center}
.m-save{padding:8px 20px;background:var(--blue-main);border:none;border-radius:var(--r);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.m-save:hover{background:#0048b8}
.m-cancel{padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit}
.m-delete{padding:8px 16px;background:rgba(192,32,32,.07);border:1px solid rgba(192,32,32,.18);border-radius:var(--r);color:var(--danger);font-size:13px;cursor:pointer;font-family:inherit;margin-right:auto}

/* METO VIEW */
#metoView{flex:1;overflow-y:auto;padding:24px}
.meto-wrap{max-width:900px;margin:0 auto}
.meto-section{margin-bottom:40px}
.meto-h1{font-size:20px;font-weight:800;color:var(--text);margin-bottom:5px}
.meto-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.meto-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.meto-zone-card{padding:16px;border-radius:var(--rl);border:1.5px solid}
.meto-zone-card.z1{border-color:var(--z1bd);background:var(--z1b)}.meto-zone-card.z2{border-color:var(--z2bd);background:var(--z2b)}.meto-zone-card.z3{border-color:var(--z3bd);background:var(--z3b)}.meto-zone-card.z4{border-color:var(--z4bd);background:var(--z4b)}
.meto-zone-num{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:3px}
.meto-zone-name{font-size:14px;font-weight:800;color:var(--text);margin-bottom:3px}
.meto-zone-pos{font-size:11px;color:var(--muted);margin-bottom:6px}
.meto-zone-desc{font-size:11px;color:var(--muted);line-height:1.5}
.meto-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.meto-ccard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.meto-ccard-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.meto-ccard-owner{font-size:11px;color:var(--blue-main);margin-bottom:6px;font-weight:600}
.meto-ccard-role{font-size:11px;color:var(--muted);line-height:1.4}
.meto-mat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.meto-mat-col{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.meto-mat-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px}
.meto-mat-item{font-size:11px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);line-height:1.4}
.meto-mat-item:last-child{border-bottom:none}

/* SAVE TOAST */
#toast{position:fixed;bottom:18px;right:18px;z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;font-size:12px;font-weight:600;display:none;align-items:center;gap:8px;box-shadow:var(--shadow-lg)}
#toast.show{display:flex}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--muted2)}
</style>
</head>
<body>

<div id="loadingScreen">
  <img src="https://blog.tripla.com.br/wp-content/uploads/2026/03/logo-horizontal-color-white-png-transparente-02.png" style="height:36px" alt="Tripla">
  <div class="ld-spin"></div>
  <div class="ld-msg">Carregando sistema...</div>
</div>

<div id="authWrap">
  <div class="auth-box">
    <img id="authLogo" src="https://blog.tripla.com.br/wp-content/uploads/2026/03/logo-horizontal-color-white-png-transparente-02.png" style="height:28px;display:block;margin-bottom:22px" alt="Tripla">
    <div class="auth-title">Bem-vindo</div>
    <div class="auth-sub">Acesse com suas credenciais corporativas</div>
    <label class="auth-lbl">E-mail</label>
    <input class="auth-inp" id="authEmail" type="email" placeholder="seu@tripla.com.br" autocomplete="email">
    <label class="auth-lbl">Senha</label>
    <input class="auth-inp" id="authPass" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="auth-btn" onclick="doLogin()">Entrar</button>
    <div class="auth-err" id="authErr"></div>
  </div>
</div>

<header id="hdr">
  <div class="hdr-brand">
    <img id="brandLogo" src="https://blog.tripla.com.br/wp-content/uploads/2026/03/logo-horizontal-color-white-png-transparente-02.png" style="height:28px" alt="Tripla">
  </div>
  <div class="hdr-sp"></div>
  <div class="hdr-tabs">
    <button class="top-tab active" onclick="setView('matrix',this)">Matriz</button>
    <button class="top-tab" onclick="setView('meto',this)">Metodologia</button>
  </div>
  <div class="hdr-btns">
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Alternar tema">☾</button>
    <button class="icon-btn" onclick="openAddModal(null)" title="Nova solução" style="font-size:18px;font-weight:300">+</button>
    <div class="user-chip" id="userChip" onclick="doLogout()">
      <div class="user-dot"></div>
      <span id="userEmail">—</span>
    </div>
  </div>
</header>

<div id="appWrap">
  <div id="mainContent">
    <div id="matrixView">
      <div class="matrix-grid" id="matrixGrid"></div>
    </div>
    <div id="metoView" class="v-hidden"></div>
    <aside id="panel">
      <div class="panel-sticky">
        <div class="panel-topbar">
          <div class="panel-left">
            <div class="panel-breadcrumb" id="panelBU"></div>
            <div class="panel-title-wrap">
              <div class="panel-title" id="panelTitle"></div>
              <input class="panel-title-edit v-hidden" id="panelTitleEdit" type="text">
            </div>
          </div>
          <div class="panel-actions">
            <button class="panel-edit-btn" id="panelEditBtn" onclick="toggleEditMode()">Editar</button>
            <button class="panel-close-btn" onclick="closePanel()">✕</button>
          </div>
        </div>
        <div class="panel-nav">
          <button class="pnav-btn active" data-tab="estrategia" onclick="switchPanelTab('estrategia',this)">Estratégia</button>
          <button class="pnav-btn" data-tab="canais" onclick="switchPanelTab('canais',this)">Canais</button>
          <button class="pnav-btn" data-tab="mercado" onclick="switchPanelTab('mercado',this)">Mercado</button>
          <button class="pnav-btn" data-tab="persona" onclick="switchPanelTab('persona',this)">Persona</button>
        </div>
      </div>
      <div class="panel-body" id="panelBody"></div>
      <div class="panel-save-bar" id="panelSaveBar">
        <button class="pcancel-btn" onclick="cancelEdit()">Cancelar</button>
        <button class="psave-btn" onclick="savePanel()">Salvar alterações</button>
      </div>
    </aside>
  </div>
</div>

<div id="tagPopup">
  <div class="popup-title" id="popupTitle"></div>
  <div class="popup-cats" id="popupCats"></div>
  <input class="popup-inp" id="popupInp" placeholder="Digite a tag e pressione Enter...">
  <div class="popup-row">
    <button class="popup-cancel" onclick="closePopup()">Cancelar</button>
    <button class="popup-save" onclick="savePopupTag()">Adicionar</button>
  </div>
</div>

<div id="addModal">
  <div class="modal-box">
    <div class="modal-h" id="modalH">Nova Solução</div>
    <div class="mf">
      <label>Nome Completo</label>
      <input id="mName" type="text" placeholder="Ex: WAF — Firewall de Aplicações · Cloudflare">
    </div>
    <div class="modal-row">
      <div class="mf">
        <label>Nome Curto</label>
        <input id="mShort" type="text" placeholder="Ex: WAF">
      </div>
      <div class="mf">
        <label>Business Unit</label>
        <select id="mBU">
          <option>Cibersegurança</option>
          <option>Governança &amp; Compliance</option>
          <option>Infraestrutura</option>
          <option>SmartOps</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div class="mf">
        <label>Complexidade</label>
        <select id="mCx"><option>Alta</option><option>Média</option><option>Baixa</option></select>
      </div>
      <div class="mf">
        <label>Conscientização</label>
        <select id="mCo"><option>Alta</option><option>Média</option><option>Baixa</option></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="m-delete v-hidden" id="mDelete" onclick="deleteCurrentSolution()">Excluir solução</button>
      <button class="m-cancel" onclick="closeModal()">Cancelar</button>
      <button class="m-save" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── FIREBASE ───────────────────────────────────────────────────────────────
const FB = firebase.initializeApp({
  apiKey:"AIzaSyBUhkJQPT2mN8bXaa6pMBhCzN3Q7nq4c8E",
  authDomain:"matriz-gtm.firebaseapp.com",
  projectId:"matriz-gtm",
  storageBucket:"matriz-gtm.firebasestorage.app",
  messagingSenderId:"538878064173",
  appId:"1:538878064173:web:dd47e64ccb0c6f024feaa4"
});
const auth = firebase.auth();
const db = firebase.firestore();

// ─── CONSTANTS ──────────────────────────────────────────────────────────────
const ZONES = [
  {z:1,name:'Evangelização',pos:'Baixa Consciência + Alta/Média Complexidade',kw:'Awareness · Sem outbound frio · Thought Leadership'},
  {z:2,name:'Especialização Competitiva',pos:'Alta/Média Consciência + Alta/Média Complexidade',kw:'Pipeline qualificado · WinRate · ABM'},
  {z:3,name:'Captura de Demanda',pos:'Alta Consciência + Baixa/Média Complexidade',kw:'Velocidade · CAC baixo · Volume'},
  {z:4,name:'Zona Morta',pos:'Baixa Consciência + Baixa Complexidade',kw:'Sem SDR ativo · Revisão periódica'}
];
const BU_COLOR = {'Cibersegurança':'cyber','Governança & Compliance':'gov','Infraestrutura':'infra','SmartOps':'smart'};
const CANAL_CATS = [
  {key:'outbound',label:'Outbound'},
  {key:'digital',label:'Digital'},
  {key:'eventos',label:'Eventos'},
  {key:'pr',label:'PR e Thought Leadership'}
];
const MAT_CATS = [
  {key:'enablement',label:'Enablement Comercial'},
  {key:'demanda',label:'Geração de Demanda'},
  {key:'abm',label:'ABM'}
];
const ICP_DADOS = [
  {key:'setores',label:'Setores'},
  {key:'subsetores',label:'Sub-setores / Verticais'},
  {key:'faturamento',label:'Faturamento / Porte'},
  {key:'headcount',label:'Funcionários / Headcount'},
  {key:'regulacao',label:'Regulação / Compliance'},
  {key:'tech',label:'Stack Tecnológico'},
  {key:'geo',label:'Geolocalização Prioritária'}
];
const ICP_QUAL = [
  {key:'caracteristicas',label:'Características da Empresa'},
  {key:'sinais',label:'Sinais de Compra / Gatilhos'},
  {key:'no',label:'Critérios Eliminatórios'}
];

// ─── STATE ──────────────────────────────────────────────────────────────────
let S = []; // solutions array
let currentSol = null;
let editMode = false;
let currentTab = 'estrategia';
let popupType = null; // 'canal' | 'material' | icp key
let popupCatKey = null;
let activeChip = null;
let unsubSolutions = null;
let pendingChanges = {}; // holds edits before save
let addingPersonaForm = false;

// ─── AUTH ────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  document.getElementById('loadingScreen').classList.add('v-hidden');
  if (user) {
    document.getElementById('authWrap').classList.remove('show');
    document.getElementById('appWrap').classList.add('show');
    document.getElementById('userEmail').textContent = user.email.split('@')[0];
    startSync();
  } else {
    document.getElementById('authWrap').classList.add('show');
    document.getElementById('appWrap').classList.remove('show');
    if (unsubSolutions) { unsubSolutions(); unsubSolutions = null; }
  }
});

function doLogin() {
  const e = document.getElementById('authEmail').value.trim();
  const p = document.getElementById('authPass').value;
  document.getElementById('authErr').textContent = '';
  auth.signInWithEmailAndPassword(e, p).catch(err => {
    document.getElementById('authErr').textContent = 'E-mail ou senha inválidos.';
  });
}
function doLogout() { if (confirm('Sair do sistema?')) auth.signOut(); }
document.getElementById('authEmail').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('authPass').focus(); });
document.getElementById('authPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ─── FIRESTORE SYNC ──────────────────────────────────────────────────────────
function startSync() {
  unsubSolutions = db.collection('solutions').onSnapshot(snap => {
    S = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderMatrix();
    if (currentSol) {
      const fresh = S.find(s => s.id === currentSol.id);
      if (fresh) { currentSol = fresh; if (!editMode) renderPanelBody(); }
    }
  });
}

function saveSolution(sol) {
  const {id, ...data} = sol;
  showToast('saving');
  const ref = id ? db.collection('solutions').doc(id) : db.collection('solutions').doc();
  return ref.set(data).then(() => showToast('saved')).catch(() => showToast('error'));
}

function deleteSolution(id) {
  return db.collection('solutions').doc(id).delete();
}

// ─── MATRIX RENDER ───────────────────────────────────────────────────────────
function renderMatrix() {
  const grid = document.getElementById('matrixGrid');
  grid.innerHTML = ZONES.map(zone => {
    const sols = S.filter(s => s.z == zone.z);
    const chips = sols.map(s => {
      const buc = BU_COLOR[s.bu] || 'cyber';
      const isActive = currentSol && currentSol.id === s.id;
      const warn = (!s.jcx || !s.jco) ? '<span class="chip-warn">!</span>' : '';
      return `<div class="chip${isActive?' active':''}" data-bu="${buc}" data-id="${s.id}" onclick="openPanel('${s.id}',this)">
        <div class="chip-dot"></div>
        <span class="chip-name">${s.short||s.name}</span>
        ${warn}
      </div>`;
    }).join('');
    return `<div class="mzone z${zone.z}">
      <div class="zone-hdr">
        <span class="zone-badge">Z${zone.z}</span>
        <span class="zone-name">${zone.name}</span>
      </div>
      <div class="zone-desc">${zone.kw}</div>
      <div class="zone-chips" id="zchips${zone.z}">${chips}<button class="zone-add" onclick="openAddModal(${zone.z})" title="Adicionar solução">+</button></div>
    </div>`;
  }).join('');
}

// ─── PANEL ───────────────────────────────────────────────────────────────────
function openPanel(id, chipEl) {
  const sol = S.find(s => s.id === id);
  if (!sol) return;
  if (editMode) cancelEdit();
  currentSol = sol;
  pendingChanges = JSON.parse(JSON.stringify(sol));
  if (activeChip) activeChip.classList.remove('active');
  activeChip = chipEl;
  if (chipEl) chipEl.classList.add('active');
  document.getElementById('panel').classList.add('open');
  renderPanelHeader();
  // reset to first tab
  currentTab = 'estrategia';
  document.querySelectorAll('.pnav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab==='estrategia'));
  renderPanelBody();
}

function closePanel() {
  if (editMode) cancelEdit();
  document.getElementById('panel').classList.remove('open');
  if (activeChip) { activeChip.classList.remove('active'); activeChip = null; }
  currentSol = null;
}

function renderPanelHeader() {
  const s = editMode ? pendingChanges : currentSol;
  if (!s) return;
  document.getElementById('panelBU').textContent = s.bu || '';
  const titleEl = document.getElementById('panelTitle');
  const titleEditEl = document.getElementById('panelTitleEdit');
  titleEl.textContent = s.name || s.short || '—';
  titleEditEl.value = s.name || '';
  titleEl.classList.toggle('v-hidden', editMode);
  titleEditEl.classList.toggle('v-hidden', !editMode);
  document.getElementById('panelEditBtn').classList.toggle('on', editMode);
  document.getElementById('panelEditBtn').textContent = editMode ? 'Editando' : 'Editar';
  document.getElementById('panelSaveBar').classList.toggle('show', editMode);
}

function toggleEditMode() {
  editMode = !editMode;
  if (editMode) {
    pendingChanges = JSON.parse(JSON.stringify(currentSol));
  }
  renderPanelHeader();
  renderPanelBody();
}

function cancelEdit() {
  editMode = false;
  pendingChanges = currentSol ? JSON.parse(JSON.stringify(currentSol)) : {};
  renderPanelHeader();
  renderPanelBody();
}

function savePanel() {
  // Collect title from edit input
  const titleVal = document.getElementById('panelTitleEdit').value.trim();
  if (titleVal) pendingChanges.name = titleVal;
  // Recalculate zone from cx/co if changed
  pendingChanges.z = calcZone(pendingChanges.cx, pendingChanges.co);
  Object.assign(currentSol, pendingChanges);
  saveSolution(currentSol);
  editMode = false;
  renderPanelHeader();
  renderPanelBody();
}

function switchPanelTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.pnav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPanelBody();
}

function renderPanelBody() {
  const body = document.getElementById('panelBody');
  if (!currentSol) { body.innerHTML = ''; return; }
  const s = editMode ? pendingChanges : currentSol;
  if (currentTab === 'estrategia') body.innerHTML = renderEstrategia(s);
  else if (currentTab === 'canais') body.innerHTML = renderCanais(s);
  else if (currentTab === 'mercado') body.innerHTML = renderMercado(s);
  else if (currentTab === 'persona') body.innerHTML = renderPersona(s);
}

// ─── TAB: ESTRATÉGIA ─────────────────────────────────────────────────────────
function renderEstrategia(s) {
  const em = editMode;
  function field(lbl, key, type='input', tooltip='') {
    const val = s[key] || '';
    const tipHtml = tooltip ? `<span class="tip"><span class="tip-icon">?</span><span class="tip-text">${tooltip}</span></span>` : '';
    if (!em) {
      return `<div class="pfield"><div class="pfield-lbl">${lbl}${tipHtml}</div><div class="${val?'pfield-val':'pfield-empty'}">${val||'—'}</div></div>`;
    }
    if (type==='textarea') return `<div class="pfield"><div class="pfield-lbl">${lbl}${tipHtml}</div><textarea oninput="pendingChanges['${key}']=this.value" rows="3">${val}</textarea></div>`;
    return `<div class="pfield"><div class="pfield-lbl">${lbl}${tipHtml}</div><input type="text" value="${escHtml(val)}" oninput="pendingChanges['${key}']=this.value"></div>`;
  }
  function selectField(lbl, key, opts) {
    const val = s[key] || opts[0];
    if (!em) return `<div class="pfield"><div class="pfield-lbl">${lbl}</div><div class="axis-pills"><span class="axis-pill ${val.toLowerCase()}">${val}</span></div></div>`;
    return `<div class="pfield"><div class="pfield-lbl">${lbl}</div><select onchange="pendingChanges['${key}']=this.value">${opts.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('')}</select></div>`;
  }
  return `
  <div class="psec">
    <div class="psec-title">Por que aqui na Matriz</div>
    ${selectField('Complexidade','cx',['Alta','Média','Baixa'])}
    ${selectField('Conscientização','co',['Alta','Média','Baixa'])}
    ${field('Justificativa — Complexidade','jcx','textarea')}
    ${field('Justificativa — Conscientização','jco','textarea')}
  </div>
  <div class="psec">
    <div class="psec-title">Postura de Prospecção</div>
    ${field('Postura','postura','textarea')}
    ${field('Argumento Principal','argumento','textarea')}
    ${field('Diferencial Competitivo','diferencial','textarea')}
  </div>
  <div class="psec">
    <div class="psec-title">Parâmetros Comerciais</div>
    ${field('Ticket Médio','ticket')}
    ${field('Contrato','contrato')}
    ${field('Ciclo de Venda','ciclo')}
    ${field('Margem Alvo','margem','input','% de margem esperada para a solução')}
  </div>`;
}

// ─── TAB: CANAIS ─────────────────────────────────────────────────────────────
function renderCanais(s) {
  const canais = (s.canais||[]).filter(t=>t.type==='canal');
  const mats = (s.canais||[]).filter(t=>t.type==='material');

  function renderGroup(title, cats, tags, tagType) {
    let html = `<div class="psec"><div class="psec-title">${title}</div>`;
    let hasAny = false;
    cats.forEach(cat => {
      const ctags = tags.filter(t=>t.cat===cat.key);
      if (!editMode && ctags.length===0) return;
      hasAny = true;
      html += `<div class="psub"><div class="psub-title">${cat.label}</div><div class="ptags">`;
      ctags.forEach((t,i) => {
        const globalIdx = (s.canais||[]).findIndex(c => c === t);
        html += `<span class="ptag">${escHtml(t.label)}${editMode?`<button class="ptag-x" onclick="removeTag(${globalIdx})">✕</button>`:''}</span>`;
      });
      if (editMode) html += `<button class="ptag-add" onclick="openTagPopup('${tagType}','${cat.key}',this)">+ Tag</button>`;
      html += `</div></div>`;
    });
    if (!hasAny && !editMode) html += `<div style="font-size:12px;color:var(--muted2);font-style:italic;padding:4px 0">Nenhum canal cadastrado</div>`;
    html += `</div>`;
    return html;
  }

  return renderGroup('Canais Relevantes', CANAL_CATS, canais, 'canal') +
         renderGroup('Ações Aderentes', MAT_CATS, mats, 'material');
}

// ─── TAB: MERCADO ─────────────────────────────────────────────────────────────
function renderMercado(s) {
  const icp = s.icp || {};

  function renderIcpGroup(title, fields) {
    let html = `<div class="psec"><div class="psec-title">${title}</div>`;
    fields.forEach(f => {
      const tags = icp[f.key] || [];
      if (!editMode && tags.length===0) return;
      html += `<div class="psub"><div class="psub-title">${f.label}</div><div class="ptags">`;
      tags.forEach((t,i) => {
        html += `<span class="ptag">${t}${editMode?`<button class="ptag-x" onclick="removeIcpTag('${f.key}',${i})">✕</button>`:''}</span>`;
      });
      if (editMode) html += `<button class="ptag-add" onclick="openTagPopup('icp','${f.key}',this)">+ Tag</button>`;
      html += `</div></div>`;
    });
    html += `</div>`;
    return html;
  }

  return renderIcpGroup('Dados de ICP', ICP_DADOS) +
         renderIcpGroup('Qualificação', ICP_QUAL);
}

// ─── TAB: PERSONA ─────────────────────────────────────────────────────────────
function renderPersona(s) {
  const personas = s.personas || [];
  let html = `<div class="psec"><div class="psec-title">Decisor</div>`;

  if (personas.length===0 && !editMode) {
    html += `<div style="font-size:12px;color:var(--muted2);font-style:italic">Nenhum decisor cadastrado</div>`;
  }

  personas.forEach((p,i) => {
    html += `<div class="persona-card">
      <div class="persona-hdr">
        <div class="persona-cargo">${p.cargo||'Cargo não informado'}</div>
        ${editMode?`<button class="persona-del" onclick="removePersona(${i})">Remover</button>`:''}
      </div>
      <div class="persona-field"><div class="persona-field-lbl">Perfil</div><div class="persona-field-val">${p.perfil||'—'}</div></div>
      <div class="persona-field"><div class="persona-field-lbl">Comportamento</div><div class="persona-field-val">${p.comportamento||'—'}</div></div>
    </div>`;
  });

  if (editMode) {
    html += `<div id="personaFormWrap"></div>`;
    html += `<button class="persona-add-btn" onclick="showPersonaForm()">+ Adicionar Decisor</button>`;
  }

  html += `</div>`;
  return html;
}

function showPersonaForm() {
  const wrap = document.getElementById('personaFormWrap');
  if (!wrap) return;
  wrap.innerHTML = `<div class="persona-form">
    <div class="pfield"><div class="pfield-lbl">Cargo</div><input id="pfCargo" type="text" placeholder="Ex: CISO, Diretor de TI..."></div>
    <div class="pfield"><div class="pfield-lbl">Perfil</div><textarea id="pfPerfil" rows="3" placeholder="Descreva o perfil deste decisor..."></textarea></div>
    <div class="pfield"><div class="pfield-lbl">Comportamento</div><textarea id="pfComport" rows="3" placeholder="Como este decisor se comporta no processo de compra..."></textarea></div>
    <div class="persona-form-actions">
      <button class="btn-sm-cancel" onclick="hidePersonaForm()">Cancelar</button>
      <button class="btn-sm-save" onclick="addPersona()">Adicionar</button>
    </div>
  </div>`;
}

function hidePersonaForm() {
  const wrap = document.getElementById('personaFormWrap');
  if (wrap) wrap.innerHTML = '';
}

function addPersona() {
  const cargo = document.getElementById('pfCargo')?.value.trim() || '';
  const perfil = document.getElementById('pfPerfil')?.value.trim() || '';
  const comportamento = document.getElementById('pfComport')?.value.trim() || '';
  if (!pendingChanges.personas) pendingChanges.personas = [];
  pendingChanges.personas.push({cargo, perfil, comportamento});
  renderPanelBody();
}

function removePersona(i) {
  if (!pendingChanges.personas) return;
  pendingChanges.personas.splice(i, 1);
  renderPanelBody();
}

// ─── TAG MANAGEMENT ──────────────────────────────────────────────────────────
let _popupMode = null; // 'canal'|'material'|'icp'
let _popupIcpKey = null;
let _addBtn = null;

function openTagPopup(mode, catOrKey, btn) {
  _popupMode = mode;
  _addBtn = btn;
  const popup = document.getElementById('tagPopup');
  const inp = document.getElementById('popupInp');
  inp.value = '';

  let cats = [];
  let title = '';

  if (mode === 'canal') {
    title = 'Novo Canal';
    cats = CANAL_CATS;
    popupCatKey = catOrKey;
    _popupIcpKey = null;
  } else if (mode === 'material') {
    title = 'Novo Material';
    cats = MAT_CATS;
    popupCatKey = catOrKey;
    _popupIcpKey = null;
  } else if (mode === 'icp') {
    title = 'Nova Tag de ICP';
    cats = [];
    popupCatKey = null;
    _popupIcpKey = catOrKey;
  }

  document.getElementById('popupTitle').textContent = title;
  const catsEl = document.getElementById('popupCats');
  if (cats.length > 0) {
    catsEl.innerHTML = cats.map(c =>
      `<button class="popup-cat${c.key===catOrKey?' on':''}" onclick="selectPopupCat('${c.key}',this)">${c.label}</button>`
    ).join('');
    catsEl.style.display = 'flex';
  } else {
    catsEl.innerHTML = '';
    catsEl.style.display = 'none';
  }

  // Position near button, clamped to viewport
  const rect = btn.getBoundingClientRect();
  const pw = 290, ph = 200;
  let top = rect.bottom + 6;
  let left = rect.left;
  if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
  if (top + ph > window.innerHeight - 12) top = Math.max(12, rect.top - ph - 6);
  popup.style.top = top + 'px';
  popup.style.left = left + 'px';
  popup.style.display = 'block';
  setTimeout(() => inp.focus(), 50);
}

function selectPopupCat(key, btn) {
  popupCatKey = key;
  document.querySelectorAll('.popup-cat').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function savePopupTag() {
  const label = document.getElementById('popupInp').value.trim();
  if (!label) return;

  if (_popupMode === 'canal' || _popupMode === 'material') {
    if (!pendingChanges.canais) pendingChanges.canais = [];
    pendingChanges.canais.push({type: _popupMode === 'canal' ? 'canal' : 'material', cat: popupCatKey, label});
  } else if (_popupMode === 'icp') {
    if (!pendingChanges.icp) pendingChanges.icp = {};
    if (!pendingChanges.icp[_popupIcpKey]) pendingChanges.icp[_popupIcpKey] = [];
    pendingChanges.icp[_popupIcpKey].push(label);
  }

  closePopup();
  renderPanelBody();
}

function closePopup() {
  document.getElementById('tagPopup').style.display = 'none';
  _popupMode = null;
  _addBtn = null;
}

function removeTag(idx) {
  if (!pendingChanges.canais) return;
  pendingChanges.canais.splice(idx, 1);
  renderPanelBody();
}

function removeIcpTag(key, idx) {
  if (!pendingChanges.icp || !pendingChanges.icp[key]) return;
  pendingChanges.icp[key].splice(idx, 1);
  renderPanelBody();
}

// ─── ADD/EDIT MODAL ───────────────────────────────────────────────────────────
let modalEditId = null;

function openAddModal(zone) {
  modalEditId = null;
  document.getElementById('modalH').textContent = 'Nova Solução';
  document.getElementById('mName').value = '';
  document.getElementById('mShort').value = '';
  document.getElementById('mBU').value = 'Cibersegurança';
  document.getElementById('mCx').value = 'Alta';
  document.getElementById('mCo').value = 'Média';
  document.getElementById('mDelete').classList.add('v-hidden');
  if (zone) document.getElementById('mBU').focus();
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('mName').focus(), 100);
}

function openEditModal(sol) {
  modalEditId = sol.id;
  document.getElementById('modalH').textContent = 'Editar Solução';
  document.getElementById('mName').value = sol.name || '';
  document.getElementById('mShort').value = sol.short || '';
  document.getElementById('mBU').value = sol.bu || 'Cibersegurança';
  document.getElementById('mCx').value = sol.cx || 'Alta';
  document.getElementById('mCo').value = sol.co || 'Média';
  document.getElementById('mDelete').classList.remove('v-hidden');
  document.getElementById('addModal').classList.add('show');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('show');
  modalEditId = null;
}

function saveModal() {
  const name = document.getElementById('mName').value.trim();
  const short = document.getElementById('mShort').value.trim();
  const bu = document.getElementById('mBU').value;
  const cx = document.getElementById('mCx').value;
  const co = document.getElementById('mCo').value;
  if (!name) { alert('Informe o nome da solução.'); return; }
  const z = calcZone(cx, co);
  if (modalEditId) {
    const sol = S.find(s => s.id === modalEditId);
    if (sol) { Object.assign(sol, {name, short, bu, cx, co, z}); saveSolution(sol); }
  } else {
    saveSolution({name, short, bu, cx, co, z, canais:[], icp:{}, personas:[]});
  }
  closeModal();
}

function deleteCurrentSolution() {
  if (!modalEditId) return;
  if (!confirm('Excluir esta solução permanentemente?')) return;
  deleteSolution(modalEditId).then(() => { closeModal(); closePanel(); showToast('deleted'); });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function calcZone(cx, co) {
  const cxV = cx==='Alta'?3:cx==='Média'?2:1;
  const coV = co==='Alta'?3:co==='Média'?2:1;
  if (coV<=1 && cxV<=1) return 4;
  if (coV<=1) return 1;
  if (cxV>=2) return 2;
  return 3;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(state) {
  const t = document.getElementById('toast');
  t.classList.add('show');
  if (state==='saving') { t.style.color='var(--blue-main)'; t.textContent='Salvando...'; }
  else if (state==='saved') { t.style.color='#22c55e'; t.textContent='✓ Salvo'; }
  else if (state==='deleted') { t.style.color='var(--muted2)'; t.textContent='Solução excluída'; }
  else { t.style.color='#f87171'; t.textContent='Erro ao salvar'; }
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── GLOBAL CLICK (close popup on outside click) ─────────────────────────────
document.addEventListener('mousedown', function(e) {
  // Close tag popup when clicking outside (cancels without saving)
  const popup = document.getElementById('tagPopup');
  if (_popupMode !== null && !popup.contains(e.target)) {
    closePopup();
  }
});

document.getElementById('popupInp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); savePopupTag(); }
  if (e.key === 'Escape') { e.preventDefault(); closePopup(); }
});
